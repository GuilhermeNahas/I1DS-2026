<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Contato</title>
</head>

<body>
    <h3> Formulário Basico</h3>
    <form method="get" action="contato.html">
        <label>Nome</label>
        <input type="text" name="nome" placeholder="Digite seu nome:" />

        <input type="submit" value="Enviar" /> <!-- BOTÂO DE ENVIO-->

        <hr />
        <h1>Formulário de Cadastro</h1>
        <form method="get" action="#" <fieldset>
            <legend>Dados Pessoais</legend>
            <label>Nome Completo</label>
            <input type="text" name="nomeCompleto" placeholder="Digite seu nome completo" />
            <br />
            <label for="email">E-mail</label>
            <input type="email" name="email" placeholder="Digite seu E-mail..." <br />


            <label for="cpf">CPF</label>
            <input type="number" name="cpf" placeholder="Digite seu CPF..." <br />


            </fieldset>
            <button type="submit">Enviar Dados</button>
            <button type="reset">Limpar o Formulário</button>

            <fieldset>
                <legend>Outras Informações</legend>
                <label>Data de Cadastro</label>
                <input type="datetime-local" name="dataCadastro" />
                <label>Data de Nascimento</label>
                <input type="date" name="dataNascimento" />

                <br />

                <input type="checkbox" name="escolaSesi" />
                <label for="escolaSesi">SESI</label>
                <input type="checkbox" name="escolaSenai" />
                <label for="escolaSesi">SENAI</label>
                <input type="checkbox" name="escola" />
                <label for="escolaSesi">Nenhuma</label>

                <input type="checkbox" name="todas" <label for="todas">Todas as anteriores</label>
                <br />

                <input type="radio" name="sexo" />
                <label for="sexo">Masculino</label>
                <input type="radio" name="sexo" <label for="sexo">Feminino</label>
                <input type="radio" name="sexo" <label for="sexo">Prefiro não dizer</label>
                <br />

                <label for="curso">Escolha seu Curso</label>
                <select name="curso">
                    <!--SELECT-> cria menus suspensos (dropdowns) ou listas de seleção (selecionar algo)-->
                    <option value="0">HTML</option>
                    <option value="1">CSS</option>
                    <option value="2">JavaScript</option>
                </select>
                <br />

                <label for="comentarios">Comentários</label>
                <textarea name="comentarios" placeholder="Digite seu comentário..." row="5" cols="120"></textarea>

            </fieldset>



        </form>



</body>

</html>
